version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: synapse-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ideamanagement
      POSTGRES_USER: idea_app
      POSTGRES_PASSWORD: idea_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/1-init-db.sql
      - ./backend/src/main/resources/add-requests-table.sql:/docker-entrypoint-initdb.d/2-add-requests-table.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idea_app -d ideamanagement"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapse-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ideamanagement
      DB_USERNAME: idea_app
      DB_PASSWORD: idea_secure_password
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-http://localhost:8080/api/mock-jwks}
      CLERK_MOCK: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_dummy}
        VITE_BACKEND_URL: http://localhost:8080
    container_name: synapse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

