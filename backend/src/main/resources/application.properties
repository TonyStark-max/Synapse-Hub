# Database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ideamanagement}
spring.datasource.username=${DB_USERNAME:idea_app}
spring.datasource.password=${DB_PASSWORD:idea_secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Security JWT configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL:http://localhost:8080/api/mock-jwks}

# Additional custom configuration
clerk.mock=${CLERK_MOCK:true}
system.admin.email=${SYSTEM_ADMIN_EMAIL:admin@example.com}

